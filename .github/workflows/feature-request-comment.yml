name: Feature Request Auto-Comment

on:
  discussion:
    types: [created]

jobs:
  comment:
    if: github.event.discussion.category.name == 'Feature Ideas'
    runs-on: ubuntu-latest
    permissions:
      discussions: write
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Thanks for the suggestion! 🙌

            Here's how this works:
            - **Vote** by clicking 👍 on the original post — not in the comments
            - The more votes an idea gets, the higher it moves in the priority queue
            - I review feature ideas **periodically** and implement the ones that benefit the most users

            If your idea is very specific to your setup, it may not make it into the core integration — I'll try to suggest a workaround in that case.

            Feel free to discuss details or alternatives below.`;

            await github.graphql(`
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                  comment { id }
                }
              }
            `, {
              discussionId: context.payload.discussion.node_id,
              body: body
            });
